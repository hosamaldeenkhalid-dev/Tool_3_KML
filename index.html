<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ArcGIS Export Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; background: white; }
        .box { border: 1px solid #ccc; border-radius: 5px; padding: 15px; }
        .status { padding: 8px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; font-weight: bold; }
        .err { background: #fdecea; color: #922b21; border: 1px solid #f5c6cb; }
        .ok { background: #eafaf1; color: #1e8449; border: 1px solid #a9dfbf; }
        .btn { background: #1a3a2a; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        #log { font-family: monospace; font-size: 10px; background: #f4f4f4; padding: 5px; margin-top: 10px; border: 1px inset #ccc; height: 40px; overflow: auto; }
    </style>
</head>
<body>

<div class="box">
    <div id="statusBox" class="status err">Checking connection to Map...</div>
    
    <div style="font-size: 11px; margin-bottom: 5px;">Detected Filter:</div>
    <div id="log">1=1</div>

    <p style="font-size: 11px; color: #555;">Tool will export assets based on your map filters.</p>
    
    <button id="btn" class="btn" disabled onclick="doExport()">DOWNLOAD KMZ</button>
</div>

<script>
    // YOUR CONFIG
    const LAYER_URL = "https://arcgis.balad.com.sa/server/rest/services/Hosted/Final_GDB_BDC_Project_Analysis/FeatureServer/1";
    let curFilter = "1=1";

    function checkMap() {
        try {
            // This line fails if Origin is different
            const parentWin = window.parent; 
            
            if (parentWin && parentWin.__jimuMapViews) {
                const mvs = Object.values(parentWin.__jimuMapViews);
                if (mvs.length > 0) {
                    const view = mvs[0].view;
                    const layer = view.map.allLayers.find(l => l.url && l.url.toLowerCase().includes("final_gdb_bdc"));
                    
                    if (layer) {
                        curFilter = layer.definitionExpression || "1=1";
                        document.getElementById('statusBox').innerText = "✓ Connected to Map";
                        document.getElementById('statusBox').className = "status ok";
                        document.getElementById('log').innerText = curFilter;
                        document.getElementById('btn').disabled = false;
                    }
                }
            }
        } catch (e) {
            document.getElementById('statusBox').innerText = "⚠ Security Block: Move file to balad.com.sa server";
            document.getElementById('statusBox').className = "status err";
        }
    }

    setInterval(checkMap, 2500);

    async function doExport() {
        const btn = document.getElementById('btn');
        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
            const q = `${LAYER_URL}/query?where=${encodeURIComponent(curFilter)}&outFields=*&f=json&returnGeometry=true&outSR=4326`;
            const res = await fetch(q);
            const data = await res.json();

            if (!data.features || data.features.length === 0) {
                alert("No features found with current filter!");
                btn.innerText = "DOWNLOAD KMZ";
                btn.disabled = false;
                return;
            }

            // Build Simple KML
            let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Export</name>`;
            data.features.forEach(f => {
                let name = f.attributes.assets_id || "Asset";
                kml += `<Placemark><name>${name}</name>`;
                // Geometry logic can be added here
                kml += `</Placemark>`;
            });
            kml += `</Document></kml>`;

            const zip = new JSZip();
            zip.file("doc.kml", kml);
            const blob = await zip.generateAsync({type:"blob"});

            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Exported_Data.kmz";
            document.body.appendChild(a);
            a.click();
            
            btn.innerText = "✓ Done!";
            setTimeout(() => { btn.innerText = "DOWNLOAD KMZ"; btn.disabled = false; }, 3000);
        } catch (err) {
            alert("Export Error: " + err.message);
            btn.innerText = "DOWNLOAD KMZ";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ArcGIS Export Tool</title>
    <!-- We need JSZip to create a KMZ (which is just a zipped KML) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; background-color: #f8f9fa; }
        .container { background: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #1a3a2a; margin-top: 0; font-size: 18px; }
        .status-box { padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; }
        .waiting { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .connected { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .btn { background: #1a3a2a; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #filterLog { font-family: monospace; font-size: 11px; background: #eee; padding: 5px; margin-top: 10px; word-break: break-all; max-height: 60px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>Export Filtered Assets</h2>
    
    <div id="status" class="status-box waiting">Searching for Map View...</div>
    
    <div style="font-size: 12px; font-weight: bold;">Applied Filter:</div>
    <div id="filterLog">1=1 (All Data)</div>

    <p style="font-size: 11px; color: #666;">This tool will export only the assets currently visible on your map.</p>
    
    <button id="exportBtn" class="btn" disabled onclick="startExport()">Download KMZ</button>
    <div id="msg" style="margin-top:10px; font-size:12px; color: #2c3e50;"></div>
</div>

<script>
    // --- CONFIGURATION ---
    // Change this to your specific layer URL
    const LAYER_URL = "https://arcgis.balad.com.sa/server/rest/services/Hosted/Final_GDB_BDC_Project_Analysis/FeatureServer/1";
    
    let currentFilter = "1=1";
    let mapConnected = false;

    // --- 1. FIND THE MAP AND SYNC FILTER ---
    function syncWithExperienceBuilder() {
        try {
            // We look at the parent window (Experience Builder)
            const parentWin = window.parent;
            
            // Experience Builder stores map info in __jimuMapViews
            if (parentWin && parentWin.__jimuMapViews) {
                const mapViews = Object.values(parentWin.__jimuMapViews);
                if (mapViews.length > 0) {
                    const view = mapViews[0].view; // Get the first map found
                    
                    // Search for your specific layer inside the map
                    const layer = view.map.allLayers.find(l => l.url && l.url.includes("Final_GDB_BDC_Project_Analysis"));
                    
                    if (layer) {
                        mapConnected = true;
                        currentFilter = layer.definitionExpression || "1=1";
                        
                        document.getElementById('status').innerText = "✓ Connected to Map";
                        document.getElementById('status').className = "status-box connected";
                        document.getElementById('filterLog').innerText = currentFilter;
                        document.getElementById('exportBtn').disabled = false;
                    }
                }
            }
        } catch (err) {
            console.error("Connection error: ", err);
            document.getElementById('status').innerText = "⚠ Security Block: Same-Origin Required";
        }
    }

    // Check for map updates every 2 seconds
    setInterval(syncWithExperienceBuilder, 2000);

    // --- 2. EXPORT LOGIC ---
    async function startExport() {
        const msg = document.getElementById('msg');
        msg.innerText = "Querying Server...";
        
        try {
            // Query the server using the current filter
            const queryUrl = `${LAYER_URL}/query?where=${encodeURIComponent(currentFilter)}&outFields=*&f=json&returnGeometry=true&outSR=4326`;
            const response = await fetch(queryUrl);
            const data = await response.json();

            if (!data.features || data.features.length === 0) {
                msg.innerText = "No data found for this filter.";
                return;
            }

            msg.innerText = `Found ${data.features.length} features. Generating KML...`;

            // Build KML String
            let kml = `<?xml version="1.0" encoding="UTF-8"?>
            <kml xmlns="http://www.opengis.net/kml/2.2">
            <Document><name>Exported Assets</name>`;
            
            data.features.forEach(f => {
                const name = f.attributes.assets_id || "Asset";
                kml += `<Placemark><name>${name}</name>`;
                // Note: Real geometry logic (Polygons/Points) would go here
                kml += `</Placemark>`;
            });
            
            kml += `</Document></kml>`;

            // Create Zip (KMZ)
            const zip = new JSZip();
            zip.file("doc.kml", kml);
            const blob = await zip.generateAsync({type:"blob"});

            // TRIGGER DOWNLOAD
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Map_Export.kmz";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            msg.innerText = "✓ Download Complete!";
        } catch (e) {
            msg.innerText = "Error: " + e.message;
        }
    }
</script>
</body>
</html>

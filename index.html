<!-- Save this as ExportTool.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KML Export Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
    /* Same styles as your original script */
    body { font-family: sans-serif; padding: 15px; background: #f4f4f4; }
    .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .status { padding: 8px; margin: 5px 0; border-radius: 4px; font-size: 12px; }
    .ok { background: #d4edda; color: #155724; }
    .warn { background: #fff3cd; color: #856404; }
    .btn-exp { width:100%; padding:10px; background:#1a3a2a; color:#fff; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
    .btn-exp:disabled { background:#ccc; }
</style>
</head>
<body>

<div class="card">
    <h3>Export to KML (KMZ)</h3>
    
    <div id="sConn" class="status warn">Checking Connection to Map...</div>
    
    <div style="margin-bottom: 10px;">
        <label style="font-size: 12px;">Active Filter Found:</label>
        <div id="filterPreview" style="font-family: monospace; font-size: 10px; background: #eee; padding: 5px; word-break: break-all;">None (Exporting All)</div>
    </div>

    <button class="btn-exp" id="btnExp" onclick="doExport()">Download Filtered KMZ</button>
    <div id="msgBox" style="margin-top:10px; font-size: 12px;"></div>
</div>

<script>
var token = ''; 
var curWhere = '1=1';
var LAYER_URL = "https://arcgis.balad.com.sa/server/rest/services/Hosted/Final_GDB_BDC_Project_Analysis/FeatureServer/1";

// 1. ATTEMPT TO SYNC WITH MAP
function syncWithMap() {
    try {
        // Try to reach out to the Experience Builder Map
        var win = window.parent;
        var foundLayer = null;

        // Look for the specific layer in the parent window's map views
        if (win.__jimuMapViews) {
            Object.values(win.__jimuMapViews).forEach(view => {
                view.view.map.allLayers.forEach(lyr => {
                    if (lyr.url && lyr.url.toLowerCase().includes("final_gdb_bdc")) {
                        foundLayer = lyr;
                    }
                });
            });
        }

        if (foundLayer) {
            document.getElementById('sConn').innerHTML = "✓ Connected to Map Layer";
            document.getElementById('sConn').className = "status ok";
            
            // GET THE FILTER
            if (foundLayer.definitionExpression) {
                curWhere = foundLayer.definitionExpression;
                document.getElementById('filterPreview').innerText = curWhere;
            } else {
                curWhere = '1=1';
                document.getElementById('filterPreview').innerText = "No filter applied (All data)";
            }
        }
    } catch (e) {
        console.error("Connection error:", e);
        document.getElementById('sConn').innerHTML = "⚠ Standalone Mode (Can't see Map Filters)";
    }
}

// Run sync every 3 seconds
setInterval(syncWithMap, 3000);

// 2. EXPORT LOGIC
async function doExport() {
    const msg = document.getElementById('msgBox');
    msg.innerHTML = "Querying data...";
    
    try {
        // Step A: Get Data from ArcGIS Server using the filter
        const queryUrl = `${LAYER_URL}/query?where=${encodeURIComponent(curWhere)}&outFields=*&f=json&returnGeometry=true&outSR=4326`;
        const response = await fetch(queryUrl);
        const data = await response.json();

        if (!data.features || data.features.length === 0) {
            msg.innerHTML = "No features found with current filter.";
            return;
        }

        msg.innerHTML = `Processing ${data.features.length} features...`;

        // Step B: Build Simple KML (Simplified version)
        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>`;
        data.features.forEach(f => {
            const name = f.attributes.assets_id || "Asset";
            kml += `<Placemark><name>${name}</name>`;
            // Add your geometry logic here similar to your original script
            kml += `</Placemark>`;
        });
        kml += `</Document></kml>`;

        // Step C: Create KMZ (Zip)
        const zip = new JSZip();
        zip.file("doc.kml", kml);
        const content = await zip.generateAsync({type:"blob"});

        // Step D: THE DOWNLOAD FIX
        // Instead of just clicking a link, we create a visible download link 
        // to bypass Iframe security blocks
        const url = window.URL.createObjectURL(content);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        a.download = 'Filtered_Export.kmz';
        document.body.appendChild(a);
        a.click();
        
        msg.innerHTML = "✓ Export Successful! Check Downloads.";
        setTimeout(() => { window.URL.revokeObjectURL(url); }, 100);

    } catch (err) {
        msg.innerHTML = "Error: " + err.message;
    }
}
</script>
</body>
</html>
